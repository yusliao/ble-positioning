name: Build and test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore BlePositioning.slnx
      - name: Build
        run: dotnet build BlePositioning.slnx -c Release --no-restore
      - name: Test (no Docker / Testcontainers)
        run: dotnet test BlePositioning.slnx -c Release --no-build --filter "Category!=docker"
