# 显式项目名：工作目录含中文时，Compose 可能无法推断 name，导致 “project name must not be empty”
name: blepositioning

services:
  api:
    build:
      context: .
      dockerfile: src/BlePositioning.API/Dockerfile
    container_name: bp-api
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      # 与本地 dotnet run 一致，启用 Swagger；生产部署请用单独编排并关闭公开 Swagger
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=blepositioning;Username=postgres;Password=Dev_Postgres_ChangeMe"
      ConnectionStrings__Redis: "redis:6379"
      ApiKey__Pepper: "docker-dev-pepper-change-me"
      Jwt__SigningKey: "DOCKER_DEV_SIGNING_KEY_AT_LEAST_32_CHARS!!"

  admin:
    build:
      context: .
      dockerfile: src/BlePositioning.Admin/Dockerfile
    container_name: bp-admin
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Api__Base: "http://api:8080"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: bp-pgsql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dev_Postgres_ChangeMe
      POSTGRES_DB: blepositioning
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blepositioning"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bp-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
